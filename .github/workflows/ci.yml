name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install verification dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile source
        run: python -m compileall -q src tests tools
      - name: Run test suite with branch coverage
        run: |
          python -m coverage run --source=src --branch -m unittest discover -s tests -v
          python -m coverage report --fail-under=85
      - name: Verify scoring regression set
        run: python tools/evaluate_scoring.py --require-perfect
      - name: Check repository structure
        run: python tools/check_project.py --skip-pdf

  portfolio-pdfs:
    name: Rebuild portfolio PDFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python tools/build_portfolio_pdfs.py
      - run: python tools/check_project.py
