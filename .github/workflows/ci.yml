name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile source
        run: python -m compileall -q src tests tools
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Check repository structure
        run: python tools/check_project.py --skip-pdf

  portfolio-pdfs:
    name: Rebuild portfolio PDFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python tools/build_portfolio_pdfs.py
      - run: python tools/check_project.py
